events { 
    worker_connections 1024; 
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream streaming_cluster {
        server streaming-service-1:8000 max_fails=1 fail_timeout=30s;
        server streaming-service-2:8000 max_fails=1 fail_timeout=30s;
    }

    # Servidor HTTP: solo redirige a HTTPS
    server {
        listen 80;
        return 301 https://$host$request_uri;
    }

    # Servidor HTTPS: toda la lógica va aquí
    server {
        listen 443 ssl;

        ssl_certificate     /etc/nginx/certs/cert.pem;
        ssl_certificate_key /etc/nginx/certs/key.pem;

        # Protocolos seguros únicamente
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        location / {
            proxy_pass http://frontend:80/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /favicon.ico { 
            log_not_found off; 
            access_log off; 
        }

        location /api/auth/ {
            proxy_pass http://auth-service:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/catalog/ {
            proxy_pass http://catalog-service:8000/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/stream/ {
            proxy_pass http://streaming_cluster/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_buffering off;

            proxy_next_upstream error timeout http_500 http_502 http_503 http_504;
            proxy_next_upstream_tries 2;
            proxy_next_upstream_timeout 3s;

            proxy_connect_timeout 1s;
            proxy_read_timeout 15s;
            proxy_send_timeout 10s;
        }

        location /media/ {
            alias /media/;
            expires 30d;
            add_header Cache-Control "public, no-transform";
            add_header Access-Control-Allow-Origin *;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS';
            add_header Access-Control-Allow-Headers 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range';
        }

        location /static/ {
            alias /static/;
            autoindex off;
        }
    }
}